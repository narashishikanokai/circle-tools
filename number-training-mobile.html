<html lang="ja">
<head>

    margin: auto;
  }
  h2 {
    text-align: center;
  }
  .big-output {
    font-size: 32px;
    text-align: center;
    margin: 30px 0;
    min-height: 40px;
  }
  button {
    width: 100%;
    padding: 15px;
    margin: 8px 0;
    font-size: 18px;
  }
  select, input[type=number], input[type=range] {

    padding: 10px;
    margin: 8px 0;
    font-size: 18px;
  }
</style>
</head>
<body>

<h2>数字トレーニング（スマホ版）</h2>

<label>モード：</label>
<select id="modeSelect">
  <option value="number">数字＋単位</option>
  <option value="date">年月日（曜日つき）</option>
  <option value="time">時刻（12時間制）</option>
  <option value="random">ランダム</option>
</select>

<label>桁数（数字モードのみ）： <span id="digitLabel">1</span> 桁</label>
<input id="digitSlider" type="range" min="1" max="9" value="1">

<label>読み上げ間隔（ミリ秒）：</label>
<input id="intervalInput" type="number" value="1200">

<label>タイマー（分）：</label>
<input id="timerMinutes" type="number" value="5">

<button onclick="start()">開始</button>
<button onclick="stop()">停止</button>

<div class="big-output" id="lastOutput">-</div>
<p>残り時間：<span id="timeLeft">-</span></p>

<script>

  "歳","円","時間","％","年",
  "ミリメートル","センチメートル","メートル","キロメートル",
  "ミリグラム","グラム","キログラム","トン",
  "か月",
  "平方センチメートル","平方メートル",
  "立方センチメートル","立方メートル",
  "リットル"
];

const weekdayNames = ["日曜日","月曜日","火曜日","水曜日","木曜日","金曜日","土曜日"];

function getRandomNumber(digits) {
  const min = Math.pow(10, digits - 1);
  const max = Math.pow(10, digits) - 1;
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function getRandomNoun() {
  return nouns[Math.floor(Math.random() * nouns.length)];
}

function getRandomYMD() {
  const year = Math.floor(Math.random() * 31) + 1995;
  const month = Math.floor(Math.random() * 12) + 1;

  let maxDay = 31;
  if ([4, 6, 9, 11].includes(month)) maxDay = 30;
  if (month === 2) maxDay = 28;

  const day = Math.floor(Math.random() * maxDay) + 1;

  const d = new Date(year, month - 1, day);
  const weekday = weekdayNames[d.getDay()];

  return `${year}年${month}月${day}日（${weekday}）`;
}

function getRandomTime() {
  const hour = Math.floor(Math.random() * 12) + 1;
  const minute = Math.floor(Math.random() * 60);
  const ampm = Math.random() < 0.5 ? "午前" : "午後";
  return `${ampm}${hour}時${minute}分`;
}
