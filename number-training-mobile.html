<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数字トレーニング(Android版)</title>

<style>
body {
  font-family: sans-serif;
  margin: 20px;
  background: #f5f5f5;
}
h2 {
  text-align: center;
}
.section {
  margin-bottom: 20px;
}
button {
  padding: 12px 18px;
  margin: 4px;
  font-size: 18px;
  border-radius: 8px;
  border: none;
  background: #ddd;
}
button.active {
  background: #4CAF50;
  color: white;
}
.big-btn {
  width: 100%;
  padding: 18px;
  font-size: 22px;
  margin-top: 10px;
  border-radius: 10px;
}
#startBtn { background: #4CAF50; color: white; }
#stopBtn { background: #d9534f; color: white; }

.output-box {
  background: white;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
  box-shadow: 0 0 8px rgba(0,0,0,0.1);
}
.output-label {
  font-size: 18px;
  color: #555;
}
.output-value {
  font-size: 32px;
  margin-top: 10px;
  margin-bottom: 10px;
}
.time-left {
  font-size: 18px;
  color: #333;
}
</style>
</head>

<body>

<h2>数字トレーニング(Android版)</h2>

<!-- モード選択 -->
<div class="section">
  <strong>モード：</strong><br>
  <button onclick="setMode('number')" id="m_number">数字＋単位</button>
  <button onclick="setMode('date')" id="m_date">年月日（曜日）</button>
  <button onclick="setMode('time')" id="m_time">時刻（12時間制）</button>
  <button onclick="setMode('random')" id="m_random">ランダム</button>
</div>

<!-- 桁数 -->
<div class="section" id="digitArea">
  <strong>桁数：</strong><br>
  <div id="digitButtons"></div>
</div>

<!-- 読み上げ間隔 -->
<div class="section">
  <strong>読み上げ間隔（秒）：</strong><br>
  <input type="range" id="intervalSlider" min="0.5" max="3" step="0.1" value="1.2">
  <span id="intervalLabel">1.2秒</span>
</div>

<!-- タイマー -->
<div class="section">
  <strong>タイマー（分）：</strong><br>
  <input type="range" id="timerSlider" min="1" max="15" step="1" value="5">
  <span id="timerLabel">5分</span>
</div>

<!-- 出力表示 -->
<div class="output-box">
  <div class="output-label">直近の出力</div>
  <div id="lastOutput" class="output-value">-</div>
  <div class="time-left">残り時間：<span id="timeLeft">-</span></div>
</div>

<button id="startBtn" class="big-btn" onclick="start()">開始</button>
<button id="stopBtn" class="big-btn" onclick="stop()">停止</button>

<script>
let running = false;
let digits = 1;
let mode = "number";
let countdownTimer = null;

// 名詞リスト（PC版と同じ）
const nouns = [
  "歳","円","時間","％","年",
  "ミリメートル","センチメートル","メートル","キロメートル",
  "ミリグラム","グラム","キログラム","トン",
  "か月",
  "平方センチメートル","平方メートル",
  "立方センチメートル","立方メートル",
  "リットル"
];

const weekdayNames = ["日曜日","月曜日","火曜日","水曜日","木曜日","金曜日","土曜日"];

// モード切替
function setMode(m) {
  mode = m;

  document.getElementById("digitArea").style.display =
    m === "number" ? "block" : "none";

  ["m_number","m_date","m_time","m_random"].forEach(id =>
    document.getElementById(id).classList.remove("active")
  );
  document.getElementById("m_" + m).classList.add("active");
}

// 桁数ボタン生成
const digitButtons = document.getElementById("digitButtons");
for (let i = 1; i <= 9; i++) {
  const btn = document.createElement("button");
  btn.textContent = i + "桁";
  btn.onclick = () => setDigits(i, btn);
  if (i === 1) btn.classList.add("active");
  digitButtons.appendChild(btn);
}

function setDigits(d, btn) {
  digits = d;
  [...digitButtons.children].forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

// 数字生成
function getRandomNumber() {
  const min = Math.pow(10, digits - 1);
  const max = Math.pow(10, digits) - 1;
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function getRandomNoun() {
  return nouns[Math.floor(Math.random() * nouns.length)];
}

// 年月日（曜日つき）
function getRandomYMD() {
  const year = Math.floor(Math.random() * 31) + 1995;
  const month = Math.floor(Math.random() * 12) + 1;

  let maxDay = 31;
  if ([4, 6, 9, 11].includes(month)) maxDay = 30;
  if (month === 2) maxDay = 28;

  const day = Math.floor(Math.random() * maxDay) + 1;

  const d = new Date(year, month - 1, day);
  const weekday = weekdayNames[d.getDay()];

  return `${year}年${month}月${day}日（${weekday}）`;
}

// 時刻（12時間制）
function getRandomTime() {
  const hour = Math.floor(Math.random() * 12) + 1;
  const minute = Math.floor(Math.random() * 60);
  const ampm = Math.random() < 0.5 ? "午前" : "午後";
  return `${ampm}${hour}時${minute}分`;
}

// ランダム
function getRandomMixed() {
  const modes = ["number", "date", "time"];
  const pick = modes[Math.floor(Math.random() * modes.length)];

  if (pick === "number") return getRandomNumber() + getRandomNoun();
  if (pick === "date") return getRandomYMD();
  return getRandomTime();
}

// 読み上げ完了後に次へ
function speakAndWait(text, interval) {
  return new Promise(resolve => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ja-JP";

    u.onend = () => {
      setTimeout(resolve, interval);
    };

    speechSynthesis.speak(u);
  });
}

// 完全同期ループ
async function loop() {
  const interval = Number(document.getElementById("intervalSlider").value) * 1000;

  while (running) {
    let output = "";

    if (mode === "number") output = getRandomNumber() + getRandomNoun();
    else if (mode === "date") output = getRandomYMD();
    else if (mode === "time") output = getRandomTime();
    else output = getRandomMixed();

    document.getElementById("lastOutput").textContent = output;

    await speakAndWait(output, interval);
  }
}

function start() {
  stop();
  running = true;

  let timeLeft = Number(document.getElementById("timerSlider").value) * 60;
  document.getElementById("timeLeft").textContent = timeLeft + "秒";

  countdownTimer = setInterval(() => {
    timeLeft--;
    document.getElementById("timeLeft").textContent = timeLeft + "秒";
    if (timeLeft <= 0) stop();
  }, 1000);

  loop();
}

function stop() {
  running = false;
  speechSynthesis.cancel();

  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = null;

  document.getElementById("timeLeft").textContent = "-";
}

// スライダー表示更新
document.getElementById("intervalSlider").oninput = function() {
  document.getElementById("intervalLabel").textContent = this.value + "秒";
};
document.getElementById("timerSlider").oninput = function() {
  document.getElementById("timerLabel").textContent = this.value + "分";
};
</script>

</body>
</html>
