<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>数字トレーニング（PC版）</title>
</head>
<body>
<h3>数字トレーニング（PC版）</h3>

<p>
  モード：
  <button onclick="setMode('number')">数字＋単位</button>
  <button onclick="setMode('date')">年月日（曜日つき）</button>
  <button onclick="setMode('time')">時刻（12時間制）</button>
  <button onclick="setMode('random')">ランダム</button>
</p>

<p id="digitArea">
  桁数：
  <button onclick="setDigits(1)">1桁</button>
  <button onclick="setDigits(2)">2桁</button>
  <button onclick="setDigits(3)">3桁</button>
  <button onclick="setDigits(4)">4桁</button>
  <button onclick="setDigits(5)">5桁</button>
  <button onclick="setDigits(6)">6桁</button>
  <button onclick="setDigits(7)">7桁</button>
  <button onclick="setDigits(8)">8桁</button>
  <button onclick="setDigits(9)">9桁</button>
</p>

<p>
  読み上げ間隔（ミリ秒）：<input id="intervalInput" type="number" value="1200">
</p>

<p>
  タイマー（分）：<input id="timerMinutes" type="number" value="5">
</p>

<button onclick="start()">開始</button>
<button onclick="stop()">停止</button>

<p>現在のモード：<span id="modeLabel">数字＋名詞</span></p>
<p>現在の桁数：<span id="digitsLabel">1</span>桁</p>
<p>直近の出力：<span id="lastOutput">-</span></p>
<p>残り時間：<span id="timeLeft">-</span></p>

<script>
let running = false;
let digits = 1;
let mode = "number";
let countdownTimer = null;

// 名詞リスト（指定の6語を削除済み）
const nouns = [
  "歳","円","時間","％","年",
  "ミリメートル","センチメートル","メートル","キロメートル",
  "ミリグラム","グラム","キログラム","トン",
  "か月",
  "平方センチメートル","平方メートル",
  "立方センチメートル","立方メートル",
  "リットル"
];

// 曜日リスト
const weekdayNames = ["日曜日","月曜日","火曜日","水曜日","木曜日","金曜日","土曜日"];

function setMode(m) {
  mode = m;

  if (m === "number") {
    document.getElementById("modeLabel").textContent = "数字＋名詞";
    document.getElementById("digitArea").style.display = "block";
  } else if (m === "date") {
    document.getElementById("modeLabel").textContent = "年月日（曜日つき）";
    document.getElementById("digitArea").style.display = "none";
  } else if (m === "time") {
    document.getElementById("modeLabel").textContent = "時刻（12時間制）";
    document.getElementById("digitArea").style.display = "none";
  } else {
    document.getElementById("modeLabel").textContent = "ランダム";
    document.getElementById("digitArea").style.display = "none";
  }
}

function setDigits(d) {
  digits = d;
  document.getElementById('digitsLabel').textContent = d;
}

function getRandomNumber() {
  const min = Math.pow(10, digits - 1);
  const max = Math.pow(10, digits) - 1;
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function getRandomNoun() {
  return nouns[Math.floor(Math.random() * nouns.length)];
}

// ★ 年月日（曜日つき）
function getRandomYMD() {
  const year = Math.floor(Math.random() * 31) + 1995; // 1995〜2025
  const month = Math.floor(Math.random() * 12) + 1;

  let maxDay = 31;
  if ([4, 6, 9, 11].includes(month)) maxDay = 30;
  if (month === 2) maxDay = 28;

  const day = Math.floor(Math.random() * maxDay) + 1;

  const d = new Date(year, month - 1, day);
  const weekday = weekdayNames[d.getDay()];

  return `${year}年${month}月${day}日（${weekday}）`;
}

// ★ 時刻（12時間制＋午前/午後）
function getRandomTime() {
  const hour = Math.floor(Math.random() * 12) + 1; // 1〜12
  const minute = Math.floor(Math.random() * 60);   // 0〜59
  const ampm = Math.random() < 0.5 ? "午前" : "午後";
  return `${ampm}${hour}時${minute}分`;
}

// ★ ランダムモード
function getRandomMixed() {
  const modes = ["number", "date", "time"];
  const pick = modes[Math.floor(Math.random() * modes.length)];

  if (pick === "number") return getRandomNumber() + getRandomNoun();
  if (pick === "date") return getRandomYMD();
  return getRandomTime();
}

// ★ 読み上げ完了後に resolve
function speakAndWait(text, interval) {
  return new Promise(resolve => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';

    u.onend = () => {
      setTimeout(resolve, interval);
    };

    speechSynthesis.speak(u);
  });
}

// ★ 完全同期ループ
async function loop() {
  const interval = Number(document.getElementById('intervalInput').value) || 1200;

  while (running) {
    let output = "";

    if (mode === "number") output = getRandomNumber() + getRandomNoun();
    else if (mode === "date") output = getRandomYMD();
    else if (mode === "time") output = getRandomTime();
    else output = getRandomMixed(); // ランダム

    document.getElementById('lastOutput').textContent = output;

    await speakAndWait(output, interval);
  }
}

function start() {
  stop();
  running = true;

  let timeLeft = Number(document.getElementById('timerMinutes').value) * 60;
  document.getElementById('timeLeft').textContent = timeLeft + "秒";

  countdownTimer = setInterval(() => {
    timeLeft--;
    document.getElementById('timeLeft').textContent = timeLeft + "秒";
    if (timeLeft <= 0) stop();
  }, 1000);

  loop();
}

function stop() {
  running = false;
  speechSynthesis.cancel();

  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = null;

  document.getElementById('timeLeft').textContent = "-";
}
</script>

</body>
</html>
